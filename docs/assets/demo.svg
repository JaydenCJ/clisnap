<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="720" height="400" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="720" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="720" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">clisnap — snapshot testing for CLIs</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> clisnap record greet -- ./greet.sh</text>
  <text x="20" y="76" fill="#c8ceda">recorded greet -&gt; .clisnap/greet.snap (exit 0, 2 redactions)</text>
  <text x="20" y="94" fill="#8b93a7">  redacted: pid×1 timestamp×1</text>

  <text x="20" y="122" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> cat .clisnap/greet.snap</text>
  <text x="20" y="142" fill="#c8ceda">|greeter 1.0</text>
  <text x="20" y="160" fill="#c8ceda">|started <tspan fill="#61afef">&lt;TIMESTAMP&gt;</tspan> pid <tspan fill="#61afef">&lt;PID&gt;</tspan></text>
  <text x="20" y="178" fill="#c8ceda">|hello, world</text>

  <text x="20" y="206" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> clisnap check   <tspan fill="#5c6370"># later, on another machine</tspan></text>
  <text x="20" y="226" fill="#c8ceda"><tspan fill="#28c840">ok</tspan>      greet</text>
  <text x="20" y="244" fill="#8b93a7">1 snapshot: 1 ok</text>

  <text x="20" y="272" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> clisnap check   <tspan fill="#5c6370"># after the output really changed</tspan></text>
  <text x="20" y="292" fill="#c8ceda"><tspan fill="#e06c75">FAIL</tspan>    greet</text>
  <text x="20" y="310" fill="#8b93a7">@@ -1,3 +1,3 @@</text>
  <text x="20" y="328" fill="#c8ceda"> started &lt;TIMESTAMP&gt; pid &lt;PID&gt;</text>
  <text x="20" y="346" fill="#e06c75">-hello, world</text>
  <text x="20" y="364" fill="#98c379">+hello there, world</text>
  <text x="20" y="386" fill="#8b93a7">1 snapshot: 0 ok, 1 failed</text>
</svg>
